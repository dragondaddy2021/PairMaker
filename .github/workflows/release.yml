name: Release to GitHub Releases

# 觸發條件：手動觸發，輸入版本號與 EAS APK 網址
on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本號（例如：1.0.0）。留空則從 app.json 自動讀取'
        required: false
        default: ''
      eas_build_url:
        description: 'EAS Build APK 網址（必填，將直接放入 Release Notes）'
        required: true
        default: ''

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # ── 1. 取得原始碼 ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. 從 app.json 讀取版本號 ─────────────────────────────────────────────
      - name: Read version from app.json
        id: version
        run: |
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          INPUT_VERSION="${{ inputs.version }}"
          FINAL_VERSION="${INPUT_VERSION:-$APP_VERSION}"
          TAG="v${FINAL_VERSION}"
          echo "version=${FINAL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"               >> "$GITHUB_OUTPUT"
          echo "版本：${FINAL_VERSION}，Tag：${TAG}"

      # ── 3. 產生 Release Notes（git log + EAS 直連）───────────────────────────
      - name: Generate Release Notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -n 1 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          {
            echo "## 📱 下載 APK"
            echo ""
            echo "點擊下方連結下載 APK（直接從 EAS 下載，檔案完整無損）："
            echo ""
            echo "### [${{ inputs.eas_build_url }}](${{ inputs.eas_build_url }})"
            echo ""
            echo "**安裝步驟：**"
            echo "1. 點擊上方連結下載 APK"
            echo "2. 下載完成後點開 APK 檔案"
            echo "3. 若出現「允許安裝未知來源」請點允許"
            echo "4. 安裝完成後開啟 PairMaker"
            echo ""
            echo "> ⚠️ 試用版說明：用戶資料為測試假資料"
            echo ""
            echo "---"
            echo ""
            echo "## 📝 變更記錄"
            echo ""
            git log $RANGE --pretty=format:"- %s" --no-merges | head -50 || echo "- 初始版本"
            echo ""
          } > release-notes.md

          cat release-notes.md

      # ── 4. 建立 GitHub Release（不上傳 APK，只放連結）───────────────────────
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:          ${{ steps.version.outputs.tag }}
          VERSION:      ${{ steps.version.outputs.version }}
        run: |
          # 若 tag 已存在則先刪除（允許重新發布相同版本）
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG 已存在，刪除舊 Release..."
            gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          fi

          gh release create "$TAG" \
            --title "PairMaker v${VERSION}" \
            --notes-file release-notes.md \
            --latest

          echo "✅ GitHub Release ${TAG} 建立成功"

      # ── 5. 輸出摘要 ──────────────────────────────────────────────────────────
      - name: Summary
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          echo "## ✅ Release 摘要" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| 項目 | 值 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 版本 | ${TAG} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| EAS APK | ${{ inputs.eas_build_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release 頁面 | https://github.com/${{ github.repository }}/releases/tag/${TAG} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 最新版入口 | https://github.com/${{ github.repository }}/releases/latest |" >> "$GITHUB_STEP_SUMMARY"
