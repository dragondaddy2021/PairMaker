name: Hotfix Validation

on:
  push:
    branches:
      - 'hotfix/**'

jobs:
  hotfix-tests:
    name: Hotfix Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run hotfix API tests
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL_STAGING }}
        run: npx vitest run --config tests/api/vitest.config.ts

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hotfix-results-${{ github.run_id }}
          path: reports/

  eas-hotfix-update:
    name: Push EAS Hotfix Update
    runs-on: ubuntu-latest
    needs: hotfix-tests
    if: success()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Push OTA update to hotfix channel
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas update --channel hotfix --message "Hotfix: ${{ github.ref_name }}" --non-interactive

  notify:
    name: Slack Hotfix Alert
    runs-on: ubuntu-latest
    needs: [hotfix-tests, eas-hotfix-update]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Send hotfix notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS:  ${{ needs.eas-hotfix-update.result }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: npx ts-node scripts/slack-notify.ts hotfix
